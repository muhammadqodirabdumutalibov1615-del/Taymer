<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Taymer - Dars va Tanaffus</title>
    <style>
        :root { --bg: #f4f4f9; --text: #333; --card: white; }
        .dark-mode { --bg: #1a1a2e; --text: #eee; --card: #16213e; }
        
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); color: var(--text); transition: 0.3s; padding-top: 50px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 350px; }
        #display { font-size: 70px; font-weight: bold; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        .buttons { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; transition: 0.2s; }
        
        .btn-main { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-mode { background: #007bff; color: white; }
        .btn-dark { background: #444; color: white; margin-top: 15px; }
        
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="status">Tayyor</h2>
        <div id="display">00:00</div>
        
        <div class="buttons">
            <button id="startStopBtn" class="btn-main" onclick="toggleTimer()">Boshlash</button>
            <button class="btn-mode" onclick="setPomodoro(25)">🎓 Dars (25 daqiqa)</button>
            <button class="btn-mode" onclick="setPomodoro(5)" style="background:#17a2b8;">☕ Tanaffus (5 daqiqa)</button>
            <button class="btn-dark" onclick="toggleDarkMode()">🌙 Tungi rejim</button>
        </div>
    </div>

    <script>
        let seconds = 200;
        let timerInterval = null;
        let isRunning = false;

        function updateDisplay() {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('display').innerText = 
                (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        }

        function toggleTimer() {
            const btn = document.getElementById('startStopBtn');
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "To'xtatish";
                btn.className = "btn-stop";
                timerInterval = setInterval(() => {
                    if (seconds > 0 || !timerInterval) {
                        if(seconds > 0) seconds--;
                        else seconds++; // Agar oddiy sekundomer bo'lsa yuqoriga sanaydi
                        updateDisplay();
                        if(seconds === 0 && timerInterval) {
                            alert("Vaqt tugadi!");
                            toggleTimer();
                        }
                    } else {
                        seconds++;
                        updateDisplay();
                    }
                }, 1000);
            } else {
                isRunning = false;
                btn.innerText = "Boshlash";
                btn.className = "btn-main";
                clearInterval(timerInterval);
            }
        }

        function setPomodoro(min) {
            clearInterval(timerInterval);
            isRunning = false;
            seconds = min * 60;
            document.getElementById('status').innerText = min === 25 ? "Diqqat: Dars" : "Hordiq: Tanaffus";
            document.getElementById('startStopBtn').innerText = "Boshlash";
            document.getElementById('startStopBtn').className = "btn-main";
            updateDisplay();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>

    <div style="margin-top: 20px; font-size: 14px; color: #888;">
        Tashriflar soni: 
        <img src="https://hitwebcounter.com/counter/counter.php?page=taymer1615&style=0006&nbdigits=5&type=page&initCount=0" title="Free Counter" Alt="web counter" border="0" />
    </div>
    </body>
</html>

</body>
</html>
