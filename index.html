<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Pul Ishlaydigan Saytim</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 100px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        #display { font-size: 60px; font-weight: bold; color: #333; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        button { padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 50px; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .stop { background: #dc3545 !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Onlayn Taymer</h2>
        <div id="display">00:00</div>
        <button id="startStopBtn" onclick="toggleTimer()">Boshlash</button>
    </div>

    <script>
        let seconds = 0;
        let timerInterval = null;
        let isRunning = false;

        function toggleTimer() {
            const btn = document.getElementById('startStopBtn');
            const display = document.getElementById('display');

            if (!isRunning) {
                isRunning = true;
                btn.innerText = "To'xtatish";
                btn.classList.add('stop');
                
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60);
                    let s = seconds % 60;
                    display.innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
                }, 1000);
            } else {
                isRunning = false;
                btn.innerText = "Boshlash";
                btn.classList.remove('stop');
                clearInterval(timerInterval);
            }
        }
    </script>
</body>
</html>
