<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Taymer - Muhammadqodir</title>
    <style>
        :root { --bg: #f4f4f9; --text: #333; --card: white; --shadow: rgba(0,0,0,0.1); }
        .dark-mode { --bg: #1a1a2e; --text: #eee; --card: #16213e; --shadow: rgba(0,0,0,0.3); }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: var(--bg); color: var(--text); transition: 0.3s; padding: 40px 10px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px var(--shadow); display: inline-block; width: 100%; max-width: 350px; }
        
        #status { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; font-weight: bold; }
        #display { font-size: 75px; font-weight: bold; margin: 15px 0; font-variant-numeric: tabular-nums; }
        
        .buttons { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer; border: none; border-radius: 15px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .btn-main { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-mode { background: #007bff; color: white; }
        .btn-break { background: #17a2b8; color: white; }
        .btn-dark { background: #444; color: white; margin-top: 10px; }
        
        button:active { transform: scale(0.96); }
        
        /* HISOBLAGICH QISMI DIZAYNI */
        .counter-section { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; font-size: 12px; color: #888; }
        .counter-section img { margin-top: 10px; border-radius: 4px; filter: grayscale(20%); }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">TAYYOR</div>
        <div id="display">00:00</div>
        
        <div class="buttons">
            <button id="startStopBtn" class="btn-main" onclick="toggleTimer()">Boshlash</button>
            <button class="btn-mode" onclick="setPomodoro(25)">🎓 Dars (25 daqiqa)</button>
            <button class="btn-break" onclick="setPomodoro(5)">☕ Tanaffus (5 daqiqa)</button>
            <button class="btn-dark" onclick="toggleDarkMode()">🌙 Tungi rejim</button>
        </div>

        <div class="counter-section">
            Tashriflar soni:<br>
            <img src="https://hitwebcounter.com/counter/counter.php?page=taymer_final_1615&style=0005&nbdigits=5&type=page&initCount=0" title="Free Counter" Alt="web counter" border="0" />
        </div>
    </div>

    <script>
        let seconds = 0;
        let timerInterval = null;
        let isRunning = false;

        function updateDisplay() {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('display').innerText = 
                (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        }

        function toggleTimer() {
            const btn = document.getElementById('startStopBtn');
            if (!isRunning) {
                if (seconds === 0) {
                    // Agar vaqt tanlanmagan bo'lsa, sekundomer kabi ishlaydi
                    timerInterval = setInterval(() => { seconds++; updateDisplay(); }, 1000);
                } else {
                    // Agar dars/tanaffus tanlangan bo'lsa, pastga sanaydi
                    timerInterval = setInterval(() => {
                        if (seconds > 0) {
                            seconds--;
                            updateDisplay();
                        } else {
                            stopTimer();
                            alert("Vaqt tugadi!");
                        }
                    }, 1000);
                }
                btn.innerText = "To'xtatish";
                btn.className = "btn-stop";
                isRunning = true;
            } else {
                stopTimer();
            }
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            const btn = document.getElementById('startStopBtn');
            btn.innerText = "Boshlash";
            btn.className = "btn-main";
        }

        function setPomodoro(min) {
            stopTimer();
            seconds = min * 60;
            document.getElementById('status').innerText = (min === 25) ? "DIQQAT: DARSDASIZ" : "HORDID: TANAFFUS";
            updateDisplay();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
